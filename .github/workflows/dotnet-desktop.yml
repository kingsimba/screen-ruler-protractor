# 构建并打包 Protractor 为 MSIX 安装包 (使用 Windows SDK 的 MakeAppx + SignTool)
#
# 两种签名方式（按优先级）：
#   1. GitHub Secrets 中设置了 Base64_Encoded_Pfx 和 Pfx_Key → 使用正式证书签名
#   2. 未设置 → 自动生成自签名测试证书（仅适合开发测试）
#
# 建议：正式发布时从 CA 购买代码签名证书并存入 GitHub Secrets。

name: Build MSIX Package

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  build:
    strategy:
      matrix:
        configuration: [Release]

    runs-on: windows-latest

    env:
      Solution_Name: Protractor.sln
      Wap_Project_Directory: Protractor.Package

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Install .NET 6 SDK (匹配项目 TargetFramework)
      - name: Install .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 6.0.x

      # dotnet publish 编译应用
      - name: dotnet publish
        run: dotnet publish Protractor.csproj -c ${{ matrix.configuration }} -o msix-content

      # 复制 manifest 和图标到发布目录
      - name: Prepare MSIX content
        run: |
          Copy-Item "Protractor.Package\Package.appxmanifest" "msix-content\AppxManifest.xml" -Force
          Copy-Item "Protractor.Package\Assets" "msix-content\Assets" -Recurse -Force

      # 生成或解码签名证书
      - name: Prepare certificate
        run: |
          $certPath = "msix-content\..\Cert.pfx"
          if ("${{ secrets.Base64_Encoded_Pfx }}" -ne "") {
            Write-Host "Using certificate from GitHub Secrets"
            $bytes = [System.Convert]::FromBase64String("${{ secrets.Base64_Encoded_Pfx }}")
            [IO.File]::WriteAllBytes($certPath, $bytes)
          } else {
            Write-Host "No certificate secret found — generating self-signed certificate"
            $cert = New-SelfSignedCertificate `
              -Type Custom `
              -Subject "CN=ScreenProtractor" `
              -KeyUsage DigitalSignature `
              -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3") `
              -CertStoreLocation "Cert:\CurrentUser\My"
            $password = ConvertTo-SecureString -String "temp1234" -Force -AsPlainText
            Export-PfxCertificate -Cert $cert -FilePath $certPath -Password $password
            Write-Host "::notice::Self-signed certificate generated. MSIX will need manual cert trust on install."
          }

      # 使用 Windows SDK 的 MakeAppx 打包 MSIX
      - name: MakeAppx
        run: |
          $makeappx = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Recurse -Filter "makeappx.exe" | Select-Object -First 1 -ExpandProperty FullName
          & "$makeappx" pack /d msix-content /p Protractor.msix /l

      # 使用 SignTool 签名
      - name: Sign MSIX
        run: |
          $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Recurse -Filter "signtool.exe" | Where-Object { $_.FullName -notlike "*arm*" } | Select-Object -First 1 -ExpandProperty FullName
          & "$signtool" sign /fd SHA256 /a /f Cert.pfx /p temp1234 Protractor.msix

      # 上传 MSIX 包
      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: Protractor-${{ github.sha }}
          path: Protractor.msix
