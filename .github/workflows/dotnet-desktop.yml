# 构建并打包 Protractor 为 MSIX 安装包
#
# 两种签名方式（按优先级）：
#   1. GitHub Secrets 中设置了 Base64_Encoded_Pfx 和 Pfx_Key → 使用正式证书签名
#   2. 未设置 → 自动生成自签名测试证书（仅适合开发测试）
#
# 建议：正式发布时从 CA 购买代码签名证书并存入 GitHub Secrets。

name: Build MSIX Package

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  build:
    strategy:
      matrix:
        configuration: [Release]

    runs-on: windows-latest

    env:
      Solution_Name: Protractor.sln
      Wap_Project_Directory: Protractor.Package
      Wap_Project_Path: Protractor.Package\Protractor.Package.wapproj

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Install .NET 6 SDK (匹配项目 TargetFramework)
      - name: Install .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 6.0.x

      # 添加 MSBuild 到 PATH
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      # 生成或解码签名证书
      - name: Prepare certificate
        run: |
          $certPath = Join-Path $env:Wap_Project_Directory "Cert.pfx"
          if ("${{ secrets.Base64_Encoded_Pfx }}" -ne "") {
            Write-Host "Using certificate from GitHub Secrets"
            $bytes = [System.Convert]::FromBase64String("${{ secrets.Base64_Encoded_Pfx }}")
            [IO.File]::WriteAllBytes($certPath, $bytes)
          } else {
            Write-Host "No certificate secret found — generating self-signed certificate"
            $cert = New-SelfSignedCertificate `
              -Type Custom `
              -Subject "CN=ScreenProtractor" `
              -KeyUsage DigitalSignature `
              -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3") `
              -CertStoreLocation "Cert:\CurrentUser\My"
            $password = ConvertTo-SecureString -String "temp1234" -Force -AsPlainText
            Export-PfxCertificate -Cert $cert -FilePath $certPath -Password $password
            Write-Host "::notice::Self-signed certificate generated. MSIX will need manual cert trust on install."
          }

      # 编译并打包 MSIX
      - name: Build and package MSIX
        run: |
          msbuild $env:Wap_Project_Path `
            /p:Configuration=${{ matrix.configuration }} `
            /p:AppxPackage=true `
            /p:AppxBundlePlatforms=x64 `
            /p:AppxBundle=Never `
            /p:UapAppxPackageBuildMode=CI `
            /p:PackageCertificateKeyFile=Cert.pfx `
            /p:PackageCertificatePassword="temp1234" `
            /p:AppxPackageDir=AppPackages

      # 上传 MSIX 包
      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: Protractor-${{ github.sha }}
          path: ${{ env.Wap_Project_Directory }}\AppPackages\**\*.msix
